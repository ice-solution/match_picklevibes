  <title>PickleVibes 推廣電郵</title>
</head>
<body style="margin:0;padding:0;background-color:#f6f8fc;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;">
    PickleVibes 匹克球公開賽現正接受報名，多個年齡及組別，立即了解詳情並網上登記。
  </div>

  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#f6f8fc;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width:600px;width:100%;background-color:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #e8ecf1;">

          <tr>
            <td align="center" style="padding:0;line-height:0;font-size:0;background-color:#f0f4f8;">
              <a href="https://example.com" target="_blank" style="text-decoration:none;border:0;display:block;">
                <img
                  src="https://example.com/images/picklevibes-poster.jpg"
                  width="600"
                  alt="PickleVibes 匹克球公開賽宣傳海報"
                  style="display:block;width:100%;max-width:600px;height:auto;margin:0;border:0;outline:none;text-decoration:none;"
                />
              </a>
            </td>
          </tr>

          <tr>
            <td style="padding:28px 24px 8px 24px;font-family:Arial,'Noto Sans TC','Microsoft JhengHei',sans-serif;">
              <h1 style="margin:0;font-size:24px;line-height:1.35;font-weight:800;color:#0B1220;">
                PickleVibes 匹克球公開賽 — 網上報名現已開放
              </h1>
            </td>
          </tr>

          <tr>
            <td style="padding:0 24px 16px 24px;font-family:Arial,'Noto Sans TC','Microsoft JhengHei',sans-serif;">
              <p style="margin:0;font-size:15px;line-height:1.6;color:#5c6570;">
                誠邀你與拍檔一同參與，體驗賽事氣氛、認識更多球友。
              </p>
            </td>
          </tr>

          <tr>
            <td style="padding:0 24px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="border-top:1px solid #eef1f5;font-size:0;line-height:0;">&nbsp;</td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:20px 24px 8px 24px;font-family:Arial,'Noto Sans TC','Microsoft JhengHei',sans-serif;">
              <p style="margin:0 0 14px 0;font-size:15px;line-height:1.7;color:#0B1220;">
                你好，我們誠意推廣即將舉行的 PickleVibes 匹克球公開賽。賽事設公開組、30+、50+、小朋友及親子等多個組別，適合不同水平與年齡的球友參與。
              </p>
              <p style="margin:0;font-size:15px;line-height:1.7;color:#0B1220;">
                網上登記手續簡便，只需填寫聯絡人及兩位球員資料、選擇組別並同意個人資料聲明即可。名額有限，歡迎盡早報名。
              </p>

          </tr>


        </table>
